    <title>Sweating Before the Wedding</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

    <div class="container">

        <header>
            <h1>Sweating Before the Wedding</h1>

            <div class="progress-section">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>

                <p id="countdown-text"></p>
            </div>
        </header>

        <main class="leaderboard">
            <!-- Owen Passes: 7 -->
            <!-- Ellie Passes: 7 -->

            <div class="team-card">

                <p class="points">14</p>
                <span>points</span>
            </div>

            <!-- Dad Passes: 6 -->
            <!-- Mom Passes: 7 -->
            <div class="team-card">
                <h2>Bluto and Olive Oyl</h2>
                <p class="points">14</p>
                <span>points</span>
            </div>
            <!-- Amber Passes: 7 -->
            <!-- Arlene Passes: 7 -->
            <div class="team-card">
                <h2>Mission: Slimpossible</h2>
                <p class="points">14</p>
                <span>points</span>
            </div>

            <!-- Max Passes: 7 -->
            <!-- Leah Passes: 7 -->

                <h2>Laxative's</h2>
                <p class="points">0</p>
                <span>points</span>
            </div>

        </main>

        <footer class="challenge-card">
            <h3>Weekly Challenge</h3>

            <p>
                Drink at least 64 oz (8 cups) of water each day this week.
            </p>

            <div class="bonus">
                Bonus: 3 points
            </div>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
